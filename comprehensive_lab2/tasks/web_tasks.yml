---
- name: install httpd
  ansible.builtin.dnf:
    name: "{{ web_package }}"
    state: present

- name: start and enable httpd
  ansible.builtin.systemd:
    name: "{{ web_service }}"
    state: started
    enabled: true

- name: copy welcome message to index.html
  ansible.builtin.copy:
    content: "Welcome to {{ app_environment }} - Version {{ app_version }}"
    dest: /var/www/html/index.html
    owner: root
    group: root
    mode: 0644
  notify: restart webserver
